name: dhiyodha
description: "Dhiyodha - empowers women through connections, growth, mentorship, and success."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.1+2

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.6.6
  shared_preferences: ^2.3.2
  connectivity_plus: ^6.0.5
  firebase_core: ^3.5.0
#  file_selector: ^1.0.3
  path_provider: ^2.1.4
  intl: ^0.20.0
  flutter_inappwebview: ^6.0.0
  permission_handler: ^11.3.1
  shimmer_animation: ^2.2.1
  country_code_picker: ^3.0.0
  getwidget: ^6.0.0
  http: ^1.2.2
  image_picker: ^1.1.2
  image_compression_flutter: ^1.0.4
  carousel_slider: ^5.0.0
  share_plus: ^10.1.1
  url_launcher: ^6.3.1
  cached_network_image: ^3.4.1
  loadmore: ^2.1.0
  markdown: ^7.3.0
  flutter_markdown: ^0.7.6+2
  font_awesome_flutter: ^10.8.0
  expandable: ^5.0.1
  dots_indicator: ^4.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
#  flutter_lints: ^4.0.0


flutter:

  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/languages/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Black.ttf
          weight: 900
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 200
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Thin.ttf
          weight: 100
